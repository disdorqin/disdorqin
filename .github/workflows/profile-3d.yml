name: 3D Contribution Graph
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: disdorqin
      
      - name: Commit and push
        run: |
          mkdir -p profile-3d-contrib
          cp -r github-profile-3d-contrib/* profile-3d-contrib/ || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/ || true
          git commit -m "chore: update 3D contribution graph" || true
          git push || true
