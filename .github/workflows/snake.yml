name: Generate Snake

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake SVG (dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: disdorqin
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23a855f7&color_dots=%23161b22,%2300f5ff,%2300d4ff,%23a855f7,%23ff00ff
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=%2300f5ff&color_dots=%23ffffff,%2300d4ff,%23a855f7,%2300f5ff,%2300ffaa

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
