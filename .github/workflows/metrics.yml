name: Metrics
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: disdorqin
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          plugins_languages: yes
          plugins_languages_colors: github
          plugins_languages_ignored: html, css, scss, vim-script
          plugins_activity: yes
          plugins_activity_days: 14
          plugins_activity_filter: all
          plugins_notable: yes
          plugins_notable_from: all
          plugins_notable_types: commit
          plugins_repositories: yes
          plugins_repositories_featured: disdorqin/DARIS,disdorqin/power-papers-daily,disdorqin/research-claw,disdorqin/tsplab
          output_action: svg
          filename: assets/metrics.svg
      - name: Commit metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/metrics.svg || true
          git commit -m "chore: update metrics.svg" || true
          git push || true
