<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Letian Zhang — AI Engineer Research Builder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.55" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="600" cy="150" r="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#0EA5E9" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.5">
    <path d="M0 40 H1200 M0 80 H1200 M0 120 H1200 M0 160 H1200 M0 200 H1200 M0 240 H1200 M0 280 H1200 M0 320 H1200"/>
    <path d="M40 0 V340 M80 0 V340 M120 0 V340 M160 0 V340 M200 0 V340 M240 0 V340 M280 0 V340 M320 0 V340 M360 0 V340 M400 0 V340 M440 0 V340 M480 0 V340 M520 0 V340 M560 0 V340 M600 0 V340 M640 0 V340 M680 0 V340 M720 0 V340 M760 0 V340 M800 0 V340 M840 0 V340 M880 0 V340 M920 0 V340 M960 0 V340 M1000 0 V340 M1040 0 V340 M1080 0 V340 M1120 0 V340 M1160 0 V340"/>
  </g>

  <!-- accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- name -->
  <text x="600" y="158" text-anchor="middle" font-family="'Fira Code','Segoe UI',monospace" font-size="74" font-weight="800" letter-spacing="6" fill="#F8FAFC">LETIAN ZHANG</text>

  <!-- subtitle -->
  <text x="600" y="212" text-anchor="middle" font-family="'Fira Code','Segoe UI',monospace" font-size="30" font-weight="700" letter-spacing="3" fill="#38BDF8">AI Engineer &#183; Research Builder</text>

  <!-- tag -->
  <text x="600" y="262" text-anchor="middle" font-family="'Fira Code','Segoe UI',monospace" font-size="18" letter-spacing="1" fill="#94A3B8">&lt;/&gt; building reproducible research infrastructure &amp; forecasting systems</text>

  <!-- bottom accent line -->
  <rect x="500" y="298" width="200" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
