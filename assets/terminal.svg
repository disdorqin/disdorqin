<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Terminal boot sequence">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#02030a"/>
    </linearGradient>
    <filter id="termGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="termSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="termScan" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#00f5ff" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Outer glow border -->
  <rect x="6" y="6" width="1188" height="288" rx="14" fill="url(#termBg)" stroke="#00f5ff" stroke-width="1" opacity="1"/>
  <rect x="6" y="6" width="1188" height="288" rx="14" fill="url(#termScan)"/>

  <!-- Neon border (inset glow) -->
  <rect x="9" y="9" width="1182" height="282" rx="11" fill="none" stroke="#a855f7" stroke-width="0.6" opacity="0.5"/>

  <!-- Top bar -->
  <g>
    <rect x="6" y="6" width="1188" height="40" rx="14" fill="#0a0e1a" opacity="0.95"/>
    <rect x="6" y="36" width="1188" height="10" fill="#0a0e1a" opacity="0.95"/>
    <line x1="6" y1="46" x2="1194" y2="46" stroke="#1f2a44" stroke-width="0.5"/>
    <!-- Traffic lights -->
    <circle cx="32" cy="26" r="6" fill="#ff5f57" filter="url(#termGlow)"/>
    <circle cx="52" cy="26" r="6" fill="#febc2e" filter="url(#termGlow)"/>
    <circle cx="72" cy="26" r="6" fill="#28c840" filter="url(#termGlow)"/>
    <!-- Title -->
    <text x="600" y="31" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#9aa6c4" letter-spacing="2">
      disdorqin@mission-control — bash — 120×30
    </text>
  </g>

  <!-- Terminal content -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#c9d1d9">
    <!-- Boot command -->
    <g transform="translate(36, 80)">
      <text fill="#a3e635" font-weight="700">disdorqin@lab</text>
      <text fill="#7a8aaa">:</text>
      <text fill="#00f5ff" font-weight="700">~</text>
      <text fill="#7a8aaa">$</text>
      <text x="160" fill="#e6edf3">boot disdorqin-lab --mode autonomous-research</text>
      <rect x="690" y="-12" width="2" height="16" fill="#00f5ff" filter="url(#termGlow)">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- OK lines -->
    <g font-size="13" letter-spacing="0.3">
      <g transform="translate(36, 112)">
        <text fill="#28c840" font-weight="700">[OK]</text>
        <text x="60" fill="#c9d1d9">Loading time-series forecasting engine</text>
        <text x="430" fill="#5a6680" opacity="0.7">v3.1.0</text>
        <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze" begin="0.4s"/>
      </g>
      <g transform="translate(36, 138)" opacity="0">
        <text fill="#28c840" font-weight="700">[OK]</text>
        <text x="60" fill="#c9d1d9">Connecting power market intelligence</text>
        <text x="430" fill="#5a6680" opacity="0.7">8 sources</text>
        <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.9s"/>
      </g>
      <g transform="translate(36, 164)" opacity="0">
        <text fill="#28c840" font-weight="700">[OK]</text>
        <text x="60" fill="#c9d1d9">Ingesting arXiv energy-system papers</text>
        <text x="430" fill="#5a6680" opacity="0.7">streaming</text>
        <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.4s"/>
      </g>
      <g transform="translate(36, 190)" opacity="0">
        <text fill="#28c840" font-weight="700">[OK]</text>
        <text x="60" fill="#c9d1d9">Spawning multi-agent research pipeline</text>
        <text x="430" fill="#5a6680" opacity="0.7">4 agents</text>
        <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.9s"/>
      </g>
      <g transform="translate(36, 216)" opacity="0">
        <text fill="#28c840" font-weight="700">[OK]</text>
        <text x="60" fill="#c9d1d9">Benchmarking forecasting experiments</text>
        <text x="430" fill="#5a6680" opacity="0.7">NSE / R2 / MAE</text>
        <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.4s"/>
      </g>
      <g transform="translate(36, 248)" opacity="0">
        <text fill="#a855f7" font-weight="700" filter="url(#termSoftGlow)">[READY]</text>
        <text x="76" fill="#00f5ff" font-weight="700" filter="url(#termGlow)">Mission Control Online</text>
        <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze" begin="2.9s"/>
      </g>
    </g>
  </g>

  <!-- Subtle scanline -->
  <rect x="6" y="46" width="1188" height="248" fill="url(#termScan)" opacity="0.4"/>

  <!-- Blinking ready dot -->
  <g transform="translate(1100, 80)">
    <circle r="3" fill="#28c840" filter="url(#termGlow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
